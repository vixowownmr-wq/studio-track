<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Studio Track{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f7f7f5;
            color: #1a1a1a;
            min-height: 100vh;
        }

        nav {
            background: white;
            border-bottom: 1px solid #ebebeb;
            padding: 0 32px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-logo-dot {
            width: 8px;
            height: 8px;
            background: #5a52d5;
            border-radius: 50%;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-user {
            font-size: 13px;
            color: #888;
        }

        .nav-link {
            font-size: 13px;
            color: #555;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #e5e5e5;
            transition: background 0.15s;
        }

        .nav-link:hover { background: #f5f5f5; }

        .nav-link-primary {
            background: #5a52d5;
            color: white;
            border-color: #5a52d5;
        }

        .nav-link-primary:hover { background: #4a43c0; }

        .container {
            max-width: 960px;
            margin: 40px auto;
            padding: 0 24px;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid transparent;
        }

        .alert-success {
            background: #f0fdf4;
            color: #166534;
            border-color: #bbf7d0;
        }

        .alert-danger {
            background: #fef2f2;
            color: #991b1b;
            border-color: #fecaca;
        }

        /* Formularios */
        .form-card {
            background: white;
            border: 1px solid #ebebeb;
            border-radius: 12px;
            padding: 32px;
            max-width: 420px;
            margin: 0 auto;
        }

        .form-card h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            color: #1a1a1a;
        }

        .form-group { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #555;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #e5e5e5;
            border-radius: 7px;
            font-size: 14px;
            color: #1a1a1a;
            background: white;
            transition: border-color 0.15s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #5a52d5;
            box-shadow: 0 0 0 3px rgba(90, 82, 213, 0.08);
        }

        .btn {
            display: inline-block;
            padding: 9px 18px;
            border-radius: 7px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #e5e5e5;
            background: white;
            color: #333;
            text-decoration: none;
            transition: background 0.15s;
        }

        .btn:hover { background: #f5f5f5; }

        .btn-primary {
            background: #5a52d5;
            color: white;
            border-color: #5a52d5;
            width: 100%;
            text-align: center;
            margin-top: 8px;
        }

        .btn-primary:hover { background: #4a43c0; }

        .form-footer {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #888;
        }

        .form-footer a { color: #5a52d5; text-decoration: none; }

        .field-error {
            font-size: 12px;
            color: #dc2626;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="{{ url_for('projects.index') }}" class="nav-logo">
            <div class="nav-logo-dot"></div>
            Studio Track
        </a>
        <div class="nav-right">
            {% if current_user.is_authenticated %}
                <span class="nav-user">{{ current_user.username }}</span>
                <a href="{{ url_for('auth.logout') }}" class="nav-link">Salir</a>
            {% else %}
                <a href="{{ url_for('auth.login') }}" class="nav-link">Entrar</a>
                <a href="{{ url_for('auth.registro') }}" class="nav-link nav-link-primary">Registrarse</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% for category, message in get_flashed_messages(with_categories=true) %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
