{% extends "base.html" %}
{% block title %}Nuevo proyecto — Studio Track{% endblock %}

{% block content %}
<div class="card" style="max-width:480px; margin:0 auto;">
    <h2 style="margin-bottom:24px; font-size:20px;">Nuevo proyecto</h2>

    <form method="POST">
        <div class="form-group">
            <label>Nombre del proyecto</label>
            <input type="text" name="nombre" placeholder="ej: Tema con Artista X" required>
        </div>
        <div class="form-group">
            <label>Descripción (opcional)</label>
            <input type="text" name="descripcion" placeholder="ej: Reggaeton, entrega mayo">
        </div>
        <p style="font-size:12px; color:#999; margin-bottom:16px;">
            Se crearán automáticamente las fases: Grabación, Maqueta, Mezcla y Master.
            Puedes agregar más después.
        </p>
        <button type="submit" class="btn btn-primary">Crear proyecto</button>
    </form>
</div>
{% endblock %}
